server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: trajectory4d

  datasource:
    url: jdbc:postgresql://localhost:5432/atc_trajectory
    username: atc
    password: atc123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  bada:
    data-path: ${user.dir}/../data/bada
  trajectory:
    time-step: 5.0
    max-iteration: 10000
  websocket:
    topic-prefix: /topic
    app-prefix: /app
    endpoint: /ws
  weather:
    data-path: ${user.dir}/../data/weather
  flight-plan:
    data-path: ${user.dir}/../data/flightplans

logging:
  level:
    com.atc.trajectory4d: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
